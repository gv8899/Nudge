name: Nudge
options:
  bundleIdPrefix: tw.nudge
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
  developmentLanguage: "zh-Hant"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    # 自動簽章；Team ID 寫在 project.yml 避免 xcodegen 重生後被清掉
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: B9NC8LR2HQ
    MARKETING_VERSION: "1.0.0"
    # Flutter 版在 tw.nudge.app 用過較低 build；從 100 起跳避免 ASC
    # 因 build number 不夠大拒絕 upload。之後每次 TestFlight +1 即可。
    CURRENT_PROJECT_VERSION: "100"

packages:
  NudgeKit:
    path: NudgeKit
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "9.0.0"

targets:
  Nudge-iOS:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Nudge-iOS
        excludes:
          - "*.plist"
          - "*.entitlements"
    dependencies:
      - package: NudgeKit
        product: NudgeCore
      - package: NudgeKit
        product: NudgeData
      - package: NudgeKit
        product: NudgeUI
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tw.nudge.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Nudge
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: Nudge-iOS/Info.plist
      properties:
        GoogleIOSClientID: "465373997523-qk21bth6e1ob034ie7hmsa9sa4gfe0ed.apps.googleusercontent.com"
        # 只用 HTTPS + 系統內建加密，不自行實作密碼學 → 豁免 export compliance
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: google-oauth
            CFBundleURLSchemes:
              - com.googleusercontent.apps.465373997523-qk21bth6e1ob034ie7hmsa9sa4gfe0ed
          - CFBundleTypeRole: Editor
            CFBundleURLName: nudge-deep-link
            CFBundleURLSchemes:
              - nudge
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true

  Nudge-macOS:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Nudge-macOS
        excludes:
          - "*.plist"
          - "*.entitlements"
    dependencies:
      - package: NudgeKit
        product: NudgeCore
      - package: NudgeKit
        product: NudgeData
      - package: NudgeKit
        product: NudgeUI
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tw.nudge.mac
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Nudge
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Nudge. All rights reserved."
        ENABLE_APP_SANDBOX: YES
        CODE_SIGN_ENTITLEMENTS: Nudge-macOS/Nudge-macOS.entitlements
    info:
      path: Nudge-macOS/Info.plist
      properties:
        GoogleMacClientID: "465373997523-a8lvq0359tapo93h77nka2820ip84ot2.apps.googleusercontent.com"
        # 只用 HTTPS + 系統內建加密，不自行實作密碼學 → 豁免 export compliance
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: google-oauth
            CFBundleURLSchemes:
              - com.googleusercontent.apps.465373997523-a8lvq0359tapo93h77nka2820ip84ot2
          - CFBundleTypeRole: Editor
            CFBundleURLName: nudge-deep-link
            CFBundleURLSchemes:
              - nudge
