name: Nudge
options:
  bundleIdPrefix: tw.nudge
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
  developmentLanguage: "zh-Hant"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    # 自動簽章；Team ID 寫在 project.yml 避免 xcodegen 重生後被清掉
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: B9NC8LR2HQ
    MARKETING_VERSION: "1.0.0"
    # Flutter 版在 tw.nudge.app 用過較低 build；從 100 起跳避免 ASC
    # 因 build number 不夠大拒絕 upload。之後每次 TestFlight +1 即可。
    CURRENT_PROJECT_VERSION: "126"

packages:
  NudgeKit:
    path: NudgeKit
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "9.0.0"
  # Sparkle — Mac 版（非 App Store）自動更新框架。只連 Nudge-macOS。
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  Nudge-iOS:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Nudge-iOS
        excludes:
          - "*.plist"
          - "*.entitlements"
    dependencies:
      - package: NudgeKit
        product: NudgeCore
      - package: NudgeKit
        product: NudgeData
      - package: NudgeKit
        product: NudgeUI
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - target: NudgeWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tw.nudge.app
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: Nudge-iOS/Nudge-iOS.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: Nudge
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: Nudge-iOS/Info.plist
      properties:
        GoogleIOSClientID: "465373997523-qk21bth6e1ob034ie7hmsa9sa4gfe0ed.apps.googleusercontent.com"
        # 只用 HTTPS + 系統內建加密，不自行實作密碼學 → 豁免 export compliance
        ITSAppUsesNonExemptEncryption: false
        # 即時同步 silent push（content-available:1）要背景喚醒 app
        UIBackgroundModes:
          - remote-notification
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: google-oauth
            CFBundleURLSchemes:
              - com.googleusercontent.apps.465373997523-qk21bth6e1ob034ie7hmsa9sa4gfe0ed
          - CFBundleTypeRole: Editor
            CFBundleURLName: nudge-deep-link
            CFBundleURLSchemes:
              - nudge
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true

  NudgeWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: NudgeWidget
        excludes:
          - "*.plist"
          - "*.entitlements"
    dependencies:
      - package: NudgeKit
        product: NudgeCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tw.nudge.app.NudgeWidget
        PRODUCT_NAME: NudgeWidget
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: NudgeWidget
        CODE_SIGN_ENTITLEMENTS: NudgeWidget/NudgeWidget.entitlements
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
    info:
      path: NudgeWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  Nudge-macOS:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Nudge-macOS
        excludes:
          - "*.plist"
          - "*.entitlements"
    dependencies:
      - package: NudgeKit
        product: NudgeCore
      - package: NudgeKit
        product: NudgeData
      - package: NudgeKit
        product: NudgeUI
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tw.nudge.mac
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Nudge
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Nudge. All rights reserved."
        # Swift 5 mode + minimal concurrency — Swift 6 strict concurrency
        # runtime checking 跟 ASWebAuthenticationSession (Swift 5
        # framework) 跨 module 邊界 isolation inference 出錯：closure
        # 被 implicit 標成 @MainActor，AS 從 XPC 背景 queue invoke 它
        # 時 dispatch_assert_queue → SIGTRAP。Swift issue #75453 已知
        # 但未修。降到 Swift 5 mode 關掉這層 runtime check，是目前唯一
        # 可靠的 workaround。iOS target 仍可保 base 的 Swift 6 + complete。
        SWIFT_VERSION: "5"
        SWIFT_STRICT_CONCURRENCY: minimal
        # Sandbox 關掉 — Direct distribution via Developer ID 不要求
        # sandbox（那是 Mac App Store 需求）；同時 sandbox + Google
        # Sign-In SDK 需要 keychain-access-groups (restricted entitlement)，
        # 又要 Developer ID provisioning profile，繞太大圈。Hardened
        # Runtime 仍開（notarization 必要、不影響此 trade-off）。
        ENABLE_APP_SANDBOX: NO
        # Hardened Runtime 是 notarization 的必要條件 — Apple 不會
        # notarize 沒開的 binary。對 sandboxed app 沒額外限制，僅多
        # 一層執行期保護（library validation / dyld restrictions /
        # debugger 阻擋）。Release 跟 Debug 都開，行為一致。
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Nudge-macOS/Nudge-macOS.entitlements
    info:
      path: Nudge-macOS/Info.plist
      properties:
        GoogleMacClientID: "465373997523-a8lvq0359tapo93h77nka2820ip84ot2.apps.googleusercontent.com"
        # 只用 HTTPS + 系統內建加密，不自行實作密碼學 → 豁免 export compliance
        ITSAppUsesNonExemptEncryption: false
        # Sparkle 自動更新 — appcast feed + EdDSA 公鑰 + 每日背景檢查。
        SUFeedURL: "https://nudge.tw/downloads/appcast.xml"
        SUPublicEDKey: "iubo9IzG5UXmKrO9PQt7Hl8AqPO5orMxIMJuOtWU7XM="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: google-oauth
            CFBundleURLSchemes:
              - com.googleusercontent.apps.465373997523-a8lvq0359tapo93h77nka2820ip84ot2
          - CFBundleTypeRole: Editor
            CFBundleURLName: nudge-deep-link
            CFBundleURLSchemes:
              - nudge
