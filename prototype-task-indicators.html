<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nudge — 任務狀態標示 prototype</title>
<style>
  :root {
    --background: #efe9d4;
    --foreground: #1c1b18;
    --primary: #a87a45;
    --primary-foreground: #efe9d4;
    --border: #c8c0a0;
    --border-light: #b5ac8a;
    --text-dim: #6e6855;
    --text-faint: #8a8068;
    --surface-hover: #ddd6ba;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--background);
    color: var(--foreground);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: 48px 32px 80px;
    line-height: 1.5;
  }
  .wrap { max-width: 1100px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 650; letter-spacing: -0.01em; }
  .lede { color: var(--text-dim); font-size: 14px; margin-top: 6px; margin-bottom: 40px; }

  .section-label {
    font-size: 12px; font-weight: 650; letter-spacing: 0.04em;
    color: var(--text-faint); text-transform: uppercase;
    margin: 40px 0 14px;
  }
  .note { font-size: 12.5px; color: var(--text-dim); margin: 4px 0 16px; }

  /* layout: desktop + mobile side by side */
  .stage { display: flex; gap: 40px; flex-wrap: wrap; align-items: flex-start; }
  .frame-label { font-size: 11px; font-weight: 600; color: var(--text-faint); margin-bottom: 8px; letter-spacing: .03em; }

  /* desktop list */
  .desktop {
    width: 560px; max-width: 100%;
    background: var(--background);
    border: 1px solid var(--border-light);
    border-radius: 14px;
    padding: 14px 10px;
  }
  /* mobile list */
  .mobile {
    width: 320px;
    background: var(--background);
    border: 1px solid var(--border-light);
    border-radius: 26px;
    padding: 16px 12px;
  }

  .group-head {
    font-size: 13px; font-weight: 650; color: var(--text-dim);
    padding: 6px 14px 8px;
  }

  /* ---- desktop row ---- */
  .row {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 14px;
    border-radius: 8px;
    min-height: 34px;
  }
  .row.hover { background: var(--surface-hover); }
  .checkbox {
    width: 17px; height: 17px; flex: none;
    border: 1.6px solid var(--border-light);
    border-radius: 5px;
  }
  .title { font-size: 14px; flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .title.done { color: var(--text-dim); text-decoration: line-through; }

  /* status indicator cluster */
  .status { display: inline-flex; align-items: center; gap: 7px; flex: none; }
  .status svg { width: 13px; height: 13px; stroke: var(--text-faint); }
  /* slight tint differentiation — reminder leans warm */
  .status .ic-bell { stroke: #9c7a4a; }

  .trailing { display: inline-flex; align-items: center; gap: 6px; flex: none; }
  .trailing svg { width: 17px; height: 17px; stroke: var(--text-dim); }
  .trailing .act { width: 30px; height: 30px; display: grid; place-items: center; border-radius: 7px; }

  /* mobile row = paper card */
  .mrow {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 14px;
    border-radius: 12px;
    background: rgba(28,27,24,0.04);
    margin-bottom: 8px;
    min-height: 56px;
  }
  .mrow .title { font-size: 15px; }
  .mrow .status svg { width: 14px; height: 14px; }
  .mrow .trailing svg { width: 18px; height: 18px; }

  .legend { display: flex; gap: 22px; margin-top: 10px; flex-wrap: wrap; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--text-dim); }
  .legend svg { width: 14px; height: 14px; }

  .opt-tag {
    display: inline-block; font-size: 11px; font-weight: 600;
    color: var(--primary); border: 1px solid var(--primary);
    border-radius: 999px; padding: 1px 9px; margin-left: 8px;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>任務狀態標示 — recurring / reminder</h1>
  <p class="lede">
    重複任務用 <strong>repeat</strong> icon、有設提醒用 <strong>bell</strong> icon。小、dim、無底色 —— 對齊 Nudge「安靜但可靠」的調性。
    下面兩個 placement 方案，桌機 + 手機都畫出來給你比。
  </p>

  <div class="legend">
    <span><svg viewBox="0 0 24 24" fill="none" stroke="#6e6855" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m17 2 4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="m7 22-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg> 重複任務</span>
    <span><svg viewBox="0 0 24 24" fill="none" stroke="#9c7a4a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8a6 6 0 0 0-12 0c0 4.499-1.411 5.956-2.738 7.326"/></svg> 有設提醒</span>
  </div>

  <!-- ============ OPTION A ============ -->
  <div class="section-label">方案 A — 貼著標題右側 <span class="opt-tag">推薦</span></div>
  <p class="note">icon 緊跟標題、讀起來是「這個任務 ＋ 它的狀態」。長標題會先 truncate、icon 永遠看得到。</p>
  <div class="stage">
    <div>
      <div class="frame-label">桌機</div>
      <div class="desktop" id="deskA"></div>
    </div>
    <div>
      <div class="frame-label">手機</div>
      <div class="mobile" id="mobA"></div>
    </div>
  </div>

  <!-- ============ OPTION B ============ -->
  <div class="section-label">方案 B — 靠右、動作區左邊</div>
  <p class="note">status icon 集中在右側、跟 📅 ⋯ 動作 icon 同一區但靠左隔開。標題永遠完整對齊。</p>
  <div class="stage">
    <div>
      <div class="frame-label">桌機</div>
      <div class="desktop" id="deskB"></div>
    </div>
    <div>
      <div class="frame-label">手機</div>
      <div class="mobile" id="mobB"></div>
    </div>
  </div>
</div>

<script>
const ICON = {
  repeat: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ic-repeat"><path d="m17 2 4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="m7 22-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg>',
  bell: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ic-bell"><path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8a6 6 0 0 0-12 0c0 4.499-1.411 5.956-2.738 7.326"/></svg>',
  calendar: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>',
  more: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>',
};
// task fixtures: [title, recurring, reminder, done, hover]
const TASKS = [
  ["回覆 e7line", true, true, false, true],
  ["看 Premium EDM 文案", true, false, false, false],
  ["回信台新改版合約", false, true, false, false],
  ["UGO operation 開發", false, false, false, false],
  ["寄出上週會議記錄", false, false, true, false],
];

function statusCluster(rec, rem) {
  if (!rec && !rem) return '';
  return `<span class="status">${rec ? ICON.repeat : ''}${rem ? ICON.bell : ''}</span>`;
}
function trailing() {
  return `<span class="trailing"><span class="act">${ICON.calendar}</span><span class="act">${ICON.more}</span></span>`;
}

// Option A: status hugs title
function rowA(t, mobile) {
  const [title, rec, rem, done, hover] = t;
  const cls = mobile ? 'mrow' : 'row' + (hover ? ' hover' : '');
  return `<div class="${cls}">
    <div class="checkbox"></div>
    <span class="title${done ? ' done' : ''}">${title}</span>
    ${statusCluster(rec, rem)}
    ${trailing()}
  </div>`;
}
// Option B: status in trailing zone, left of actions
function rowB(t, mobile) {
  const [title, rec, rem, done, hover] = t;
  const cls = mobile ? 'mrow' : 'row' + (hover ? ' hover' : '');
  return `<div class="${cls}">
    <div class="checkbox"></div>
    <span class="title${done ? ' done' : ''}">${title}</span>
    <span style="flex:1"></span>
    ${statusCluster(rec, rem)}
    ${trailing()}
  </div>`;
}

function render(id, fn, mobile) {
  const head = `<div class="group-head">今天 (${TASKS.length})</div>`;
  document.getElementById(id).innerHTML = head + TASKS.map(t => fn(t, mobile)).join('');
}
render('deskA', rowA, false);
render('mobA',  rowA, true);
render('deskB', rowB, false);
render('mobB',  rowB, true);
</script>
</body>
</html>
